<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' https:; img-src 'self' https: data: blob:; connect-src 'self' https:; font-src 'self' https://fonts.gstatic.com;">
<title>GLOBAL STRIKE — Nuclear Strategy</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#070a0f;--bg2:#0d1117;--bg3:#161b22;--bg4:#1c2230;
  --text:#c9d1d9;--text2:#8b949e;--text3:#484f58;
  --red:#f85149;--red-glow:rgba(248,81,73,.4);
  --orange:#d29922;--orange-glow:rgba(210,153,34,.35);
  --yellow:#e3b341;--yellow-glow:rgba(227,179,65,.3);
  --blue:#58a6ff;--blue-glow:rgba(88,166,255,.3);
  --green:#3fb950;--green-glow:rgba(63,185,80,.3);
  --accent:#7c72ff;--accent2:#a5a0ff;
  --border:rgba(240,246,252,.06);
  --border2:rgba(240,246,252,.1);
  --glass:rgba(13,17,23,.75);
  --glass2:rgba(13,17,23,.9);
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;-webkit-font-smoothing:antialiased}

/* ─── Layout ─── */
.app{display:grid;grid-template-rows:auto 1fr;grid-template-columns:1fr 400px;height:100vh;position:relative}

/* ─── Top Bar ─── */
.top-bar{grid-column:1/-1;display:flex;align-items:center;gap:16px;padding:10px 24px;background:var(--glass2);border-bottom:1px solid var(--border);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);z-index:100;position:relative}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:10px;height:10px;border-radius:50%;background:#ff4444;box-shadow:0 0 12px rgba(255,68,68,.6),0 0 30px rgba(255,68,68,.2);animation:pulse-dot 1.5s ease-in-out infinite}
@keyframes pulse-dot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.7)}}
.logo-text{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--red)}
.logo-year{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text3);letter-spacing:1px;margin-left:4px;padding:2px 8px;border:1px solid var(--border2);border-radius:3px}
.stats-row{display:flex;gap:20px;margin-left:auto;align-items:center}
.stat{text-align:center;padding:0 16px;border-right:1px solid var(--border)}
.stat:last-child{border:none;padding-right:0}
.stat-val{font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:700;color:#fff}
.stat-val.danger{color:var(--red)}
.stat-val.warn{color:var(--orange)}
.stat-val.info{color:var(--blue)}
.stat-label{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);margin-top:2px}
.mobile-toggle{display:none;background:none;border:1px solid var(--border2);color:var(--text2);padding:6px 10px;border-radius:4px;cursor:pointer;font-size:16px}

/* ─── Globe Area ─── */
.globe-area{position:relative;overflow:hidden;background:var(--bg);cursor:grab;-webkit-user-select:none;user-select:none}
.globe-area:active{cursor:grabbing}
.globe-area.dragging{cursor:grabbing}
#globeCanvas{width:100%;height:100%;display:block}

/* ─── Globe Overlays ─── */
.zoom-controls{position:absolute;bottom:24px;right:24px;display:flex;flex-direction:column;gap:4px;z-index:20}
.zoom-btn{width:36px;height:36px;background:var(--glass);border:1px solid var(--border2);border-radius:6px;color:var(--text2);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .25s;font-family:'JetBrains Mono',monospace;backdrop-filter:blur(12px)}
.zoom-btn:hover{background:var(--bg4);color:#fff;border-color:var(--accent);transform:scale(1.05)}
.time-stamp{position:absolute;top:16px;left:16px;font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text3);letter-spacing:1px;z-index:20;background:var(--glass);padding:6px 12px;border-radius:6px;border:1px solid var(--border);backdrop-filter:blur(12px)}
.legend{position:absolute;bottom:24px;left:24px;display:flex;gap:14px;z-index:20;background:var(--glass);padding:10px 16px;border-radius:8px;border:1px solid var(--border);backdrop-filter:blur(12px)}
.legend-item{display:flex;align-items:center;gap:6px;font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text3);letter-spacing:.5px}
.legend-dot{width:8px;height:8px;border-radius:50%}
.globe-controls-row{position:absolute;top:16px;right:24px;z-index:20;display:flex;gap:6px}
.globe-ctrl-btn{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--text3);background:var(--glass);border:1px solid var(--border);padding:6px 14px;border-radius:6px;cursor:pointer;backdrop-filter:blur(12px);transition:all .25s}
.globe-ctrl-btn:hover,.globe-ctrl-btn.active{color:var(--accent2);border-color:var(--accent)}

/* ─── Tooltip ─── */
.tooltip{position:fixed;z-index:1000;pointer-events:none;background:var(--glass2);border:1px solid var(--border2);border-radius:8px;padding:12px 16px;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);max-width:280px;opacity:0;transform:translateY(6px);transition:opacity .15s,transform .15s;box-shadow:0 8px 32px rgba(0,0,0,.4)}
.tooltip.visible{opacity:1;transform:translateY(0)}
.tt-name{font-size:13px;font-weight:600;color:#fff;margin-bottom:4px;display:flex;align-items:center;gap:6px}
.tt-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.tt-region{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
.tt-summary{font-size:11px;color:var(--text2);line-height:1.5;margin-bottom:8px}
.tt-stats{display:flex;gap:12px}
.tt-stat{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text3)}
.tt-stat span{color:var(--text)}

/* ─── Country Tooltip ─── */
.country-tooltip{position:fixed;z-index:1001;pointer-events:auto;background:var(--glass2);border:1px solid var(--border2);border-radius:10px;padding:16px 20px;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);max-width:320px;min-width:220px;opacity:0;transform:translateY(8px) scale(0.97);transition:opacity .2s,transform .2s;box-shadow:0 12px 48px rgba(0,0,0,.5),0 0 0 1px rgba(124,114,255,.08);display:none}
.country-tooltip.visible{opacity:1;transform:translateY(0) scale(1);display:block}
.ct-header{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.ct-flag{font-size:28px;line-height:1}
.ct-name{font-size:15px;font-weight:700;color:#fff;letter-spacing:.3px}
.ct-region{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px}
.ct-conflicts-title{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:1.5px;text-transform:uppercase;color:var(--accent2);margin-bottom:6px;display:flex;align-items:center;gap:5px}
.ct-conflicts-title::before{content:'';width:3px;height:10px;background:var(--accent);border-radius:2px}
.ct-conflict-link{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:6px;background:rgba(124,114,255,.06);border:1px solid rgba(124,114,255,.12);cursor:pointer;transition:all .2s;margin-bottom:4px}
.ct-conflict-link:hover{background:rgba(124,114,255,.15);border-color:var(--accent);transform:translateX(2px)}
.ct-conflict-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.ct-conflict-name{font-size:11px;color:var(--text);font-weight:500;flex:1}
.ct-conflict-sev{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px}
.ct-no-conflict{font-size:11px;color:var(--text3);padding:4px 0;font-style:italic}
.ct-close{position:absolute;top:8px;right:8px;background:none;border:1px solid var(--border);color:var(--text3);width:22px;height:22px;border-radius:5px;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.ct-close:hover{color:#fff;border-color:var(--accent);background:rgba(124,114,255,.15)}

/* ─── HTML Markers & Leader Lines ─── */
.leader-lines{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:25}
.html-markers-container{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:30}
.html-marker{position:absolute;transform:translate(-50%,-50%);pointer-events:auto;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:opacity .2s}
.html-marker.hidden{opacity:0;pointer-events:none}
.html-marker-core{border-radius:50%;position:relative;z-index:2;transition:transform .2s}
.html-marker:hover .html-marker-core{transform:scale(1.5)}
.html-marker.active .html-marker-core{transform:scale(1.5)}
.html-marker-glow{position:absolute;border-radius:50%;z-index:1}
.html-marker-ring{position:absolute;border-radius:50%;border:2px solid transparent;z-index:3;opacity:0.6}
.html-marker-nuke{position:absolute;border-radius:50%;border:1px solid var(--red);z-index:4;opacity:0.3}

/* ─── Iran Deep-Dive Tab ─── */
.iran-hero{padding:20px;border-bottom:1px solid var(--border);background:linear-gradient(135deg,rgba(248,81,73,.06),rgba(210,153,34,.04))}
.iran-hero-title{font-size:16px;font-weight:700;color:#fff;margin-bottom:4px;display:flex;align-items:center;gap:8px}
.iran-hero-sub{font-size:11px;color:var(--text2);line-height:1.5}
.iran-hero-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px}
.iran-hero-stat{background:var(--bg3);padding:10px;border-radius:6px;border:1px solid var(--border);text-align:center}
.iran-hero-stat .val{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:700;color:#fff}
.iran-hero-stat .lbl{font-size:8px;letter-spacing:1px;text-transform:uppercase;color:var(--text3);margin-top:2px}
.iran-section{padding:16px 20px;border-bottom:1px solid var(--border)}
.iran-section-title{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--accent2);margin-bottom:12px;display:flex;align-items:center;gap:6px}
.iran-section-title::before{content:'';width:3px;height:12px;background:var(--accent);border-radius:2px}
.timeline-event{display:flex;gap:12px;padding:8px 0;position:relative}
.timeline-event+.timeline-event{border-top:1px solid var(--border)}
.te-date{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text3);width:70px;flex-shrink:0;padding-top:2px}
.te-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px}
.te-dot.escalation{background:var(--red);box-shadow:0 0 6px var(--red-glow)}
.te-dot.strike{background:var(--orange);box-shadow:0 0 6px var(--orange-glow)}
.te-dot.diplomacy{background:var(--green);box-shadow:0 0 6px var(--green-glow)}
.te-dot.intel{background:var(--blue);box-shadow:0 0 6px var(--blue-glow)}
.te-text{font-size:11px;color:var(--text);line-height:1.5;flex:1}
.te-text strong{color:#fff;font-weight:600}

/* ─── Military Cards ─── */
.mil-card{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:8px}
.mil-card-header{display:flex;align-items:center;gap:8px;margin-bottom:10px;cursor:pointer}
.mil-card-flag{font-size:18px}
.mil-card-name{font-size:13px;font-weight:600;color:#fff;flex:1}
.mil-card-toggle{font-size:10px;color:var(--text3);transition:transform .2s}
.mil-card-toggle.open{transform:rotate(180deg)}
.mil-card-body{display:none;overflow:hidden}
.mil-card-body.open{display:block}
.mil-row{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--border);font-size:11px}
.mil-row:last-child{border:none}
.mil-row .k{color:var(--text2)}
.mil-row .v{font-family:'JetBrains Mono',monospace;color:#fff;font-weight:500}
.mil-row .v.danger{color:var(--red)}
.mil-row .v.warn{color:var(--orange)}
.mil-row .v.info{color:var(--blue)}
.mil-row .v.green{color:var(--green)}
.mil-sub{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--text3);margin:10px 0 6px;padding-top:6px;border-top:1px solid var(--border)}
.mil-bar{height:4px;background:var(--bg4);border-radius:2px;margin-top:4px;overflow:hidden}
.mil-bar-fill{height:100%;border-radius:2px;transition:width .6s cubic-bezier(.4,0,.2,1)}
.mil-compare{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
.mil-compare-item{text-align:center;padding:8px;background:var(--bg4);border-radius:6px;border:1px solid var(--border)}
.mil-compare-val{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:700}
.mil-compare-lbl{font-size:8px;letter-spacing:1px;text-transform:uppercase;color:var(--text3);margin-top:2px}

/* ─── Weapons Systems ─── */
.weapon-chip{display:inline-flex;align-items:center;gap:4px;font-family:'JetBrains Mono',monospace;font-size:9px;padding:3px 8px;border-radius:4px;background:var(--bg4);border:1px solid var(--border);color:var(--text2);margin:2px}

/* ─── Vector Labels ─── */
.vector-label{position:absolute;pointer-events:none;font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(200,210,225,.35);white-space:nowrap;transform:translate(-50%,-50%);transition:opacity .3s;text-shadow:0 0 8px rgba(0,0,0,.8)}
.vector-label.visible{color:rgba(200,210,225,.5)}
.conflict-zone-label{position:absolute;pointer-events:none;font-family:'JetBrains Mono',monospace;font-size:7px;letter-spacing:1px;text-transform:uppercase;white-space:nowrap;transform:translate(-50%,-50%);padding:2px 6px;border-radius:3px;border:1px solid;transition:opacity .3s}

/* ─── Sidebar ─── */
.sidebar{background:var(--bg2);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;z-index:50;transition:transform .35s cubic-bezier(.4,0,.2,1)}
.sidebar-header{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:10px}
.sidebar-tabs{display:flex;gap:0;border:1px solid var(--border2);border-radius:6px;overflow:hidden}
.sidebar-tab{flex:1;font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;padding:8px 12px;background:transparent;border:none;color:var(--text3);cursor:pointer;transition:all .25s;text-align:center}
.sidebar-tab:hover{color:var(--text2);background:var(--bg3)}
.sidebar-tab.active{color:var(--accent2);background:rgba(124,114,255,.1)}
.search-box{position:relative}
.search-box input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:6px;padding:8px 12px 8px 32px;font-size:11px;color:var(--text);font-family:'DM Sans',sans-serif;outline:none;transition:border-color .25s,box-shadow .25s}
.search-box input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(124,114,255,.12)}
.search-box input::placeholder{color:var(--text3)}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:12px}
.filters{display:flex;flex-wrap:wrap;gap:5px}
.filter-btn{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:1px;text-transform:uppercase;padding:4px 10px;border:1px solid var(--border2);border-radius:4px;background:transparent;color:var(--text3);cursor:pointer;transition:all .25s;user-select:none}
.filter-btn:hover,.filter-btn.active{border-color:var(--accent);color:var(--accent2);background:rgba(124,114,255,.1)}
.sort-controls{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px;padding-top:6px;border-top:1px solid var(--border)}
.sort-btn{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:.5px;text-transform:uppercase;padding:3px 8px;border:1px solid var(--border);border-radius:3px;background:transparent;color:var(--text3);cursor:pointer;transition:all .25s;user-select:none}
.sort-btn:hover,.sort-btn.active{border-color:var(--accent);color:var(--accent2);background:rgba(124,114,255,.08)}
.dp-related{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px}
.dp-related-title{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);margin-top:14px;margin-bottom:6px;font-family:'JetBrains Mono',monospace}
.dp-related-chip{font-size:10px;padding:4px 12px;border-radius:4px;background:rgba(124,114,255,.08);border:1px solid rgba(124,114,255,.2);color:var(--accent2);cursor:pointer;transition:all .2s;user-select:none}
.dp-related-chip:hover{background:rgba(124,114,255,.18);border-color:var(--accent);transform:translateY(-1px)}

/* ─── Timeline Slider ─── */
.timeline-container{padding:8px 20px 12px;border-bottom:1px solid var(--border)}
.timeline-label{display:flex;justify-content:space-between;font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text3);letter-spacing:.5px;margin-bottom:6px}
.timeline-slider{width:100%;-webkit-appearance:none;appearance:none;height:4px;background:var(--bg4);border-radius:2px;outline:none;cursor:pointer}
.timeline-slider::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--accent);border:2px solid var(--bg2);cursor:pointer;box-shadow:0 0 8px rgba(124,114,255,.4);transition:transform .2s}
.timeline-slider::-webkit-slider-thumb:hover{transform:scale(1.2)}
.timeline-slider::-moz-range-thumb{width:14px;height:14px;border-radius:50%;background:var(--accent);border:2px solid var(--bg2);cursor:pointer}

/* ─── Sidebar Content ─── */
.sidebar-content{flex:1;overflow:hidden;display:flex;flex-direction:column}
.tab-panel{flex:1;overflow-y:auto;padding:8px;display:none}
.tab-panel.active{display:block}
.tab-panel::-webkit-scrollbar{width:4px}
.tab-panel::-webkit-scrollbar-track{background:transparent}
.tab-panel::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* ─── Conflict Cards ─── */
.conflict-card{padding:14px 16px;border-radius:8px;border:1px solid transparent;cursor:pointer;transition:all .25s;margin-bottom:4px;position:relative;overflow:hidden;user-select:none;-webkit-user-select:none}
.conflict-card::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;border-radius:3px 0 0 3px;opacity:0;transition:opacity .25s}
.conflict-card:hover{background:var(--bg3);border-color:var(--border2)}
.conflict-card:hover::before{opacity:1}
.conflict-card.sev-war::before{background:var(--red)}
.conflict-card.sev-high::before{background:var(--orange)}
.conflict-card.sev-medium::before{background:var(--yellow)}
.conflict-card.sev-tension::before{background:var(--blue)}
.conflict-card.active{background:var(--bg4);border-color:var(--accent);box-shadow:0 0 20px rgba(124,114,255,.08)}
.cc-top{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.cc-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.cc-dot.war{background:var(--red);box-shadow:0 0 8px var(--red-glow)}
.cc-dot.high{background:var(--orange);box-shadow:0 0 8px var(--orange-glow)}
.cc-dot.medium{background:var(--yellow);box-shadow:0 0 8px var(--yellow-glow)}
.cc-dot.tension{background:var(--blue);box-shadow:0 0 8px var(--blue-glow)}
.cc-name{font-size:13px;font-weight:600;color:#e6edf3;flex:1}
.cc-region{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:1px;color:var(--text3);text-transform:uppercase;padding:2px 6px;border:1px solid var(--border);border-radius:3px;flex-shrink:0}
.cc-summary{font-size:11px;color:var(--text2);line-height:1.5;margin-bottom:8px}
.cc-stats{display:flex;gap:12px}
.cc-stat{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text3)}
.cc-stat span{color:var(--text)}
.nuke-badge{display:inline-flex;align-items:center;gap:4px;font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--red);border:1px solid rgba(248,81,73,.25);border-radius:3px;padding:2px 6px;margin-left:6px;background:rgba(248,81,73,.06)}
.nuke-icon{width:5px;height:5px;border-radius:50%;background:var(--red);animation:pulse-dot 1.5s infinite}

/* ─── Mini Charts ─── */
.charts-panel{padding:16px 20px;border-bottom:1px solid var(--border)}
.chart-title{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);margin-bottom:10px}
.bar-chart{display:flex;flex-direction:column;gap:6px}
.bar-row{display:flex;align-items:center;gap:8px}
.bar-label{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text3);width:60px;text-align:right;flex-shrink:0}
.bar-track{flex:1;height:6px;background:var(--bg4);border-radius:3px;overflow:hidden;position:relative}
.bar-fill{height:100%;border-radius:3px;transition:width .6s cubic-bezier(.4,0,.2,1)}
.bar-val{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text2);width:28px;text-align:right;flex-shrink:0}
.intensity-row{display:flex;gap:8px;margin-top:12px}
.intensity-block{flex:1;text-align:center;padding:8px 4px;border-radius:6px;background:var(--bg3);border:1px solid var(--border)}
.intensity-count{font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:700}
.intensity-label{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:1px;text-transform:uppercase;color:var(--text3);margin-top:2px}

/* ─── News Feed ─── */
.news-item{padding:14px 16px;border-radius:8px;border:1px solid transparent;transition:all .25s;margin-bottom:4px;cursor:pointer;user-select:none;-webkit-user-select:none}
.news-item:hover{background:var(--bg3);border-color:var(--border2)}
.news-source{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--accent2);letter-spacing:.5px;text-transform:uppercase;margin-bottom:4px;display:flex;align-items:center;gap:6px}
.news-source-dot{width:4px;height:4px;border-radius:50%;background:var(--green)}
.news-title{font-size:13px;font-weight:600;color:#e6edf3;line-height:1.4;margin-bottom:4px}
.news-desc{font-size:11px;color:var(--text2);line-height:1.5;margin-bottom:6px}
.news-time{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text3)}
.news-loading{text-align:center;padding:40px;color:var(--text3);font-size:12px}
.news-loading .spinner{width:20px;height:20px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}

/* ─── Detail Panel ─── */
.detail-panel{position:absolute;bottom:0;left:0;right:400px;background:linear-gradient(to top,var(--glass2) 80%,transparent);padding:28px 32px 24px;transform:translateY(100%);transition:transform .4s cubic-bezier(.4,0,.2,1);z-index:30;border-top:1px solid var(--border);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.detail-panel.visible{transform:translateY(0)}
.dp-close{position:absolute;top:12px;right:16px;background:var(--bg3);border:1px solid var(--border2);color:var(--text2);width:30px;height:30px;border-radius:6px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .25s}
.dp-close:hover{background:var(--bg4);color:#fff;border-color:var(--accent)}
.dp-title{font-size:20px;font-weight:700;color:#fff;margin-bottom:4px;display:flex;align-items:center;flex-wrap:wrap;gap:8px}
.dp-sub{font-size:11px;color:var(--text2);margin-bottom:14px}
.dp-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.dp-metric{background:var(--bg3);padding:12px 14px;border-radius:8px;border:1px solid var(--border)}
.dp-metric-val{font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:700;color:#fff}
.dp-metric-label{font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--text3);margin-top:3px}
.dp-summary{font-size:12px;color:var(--text2);line-height:1.65;margin-bottom:14px}
.dp-parties{display:flex;flex-wrap:wrap;gap:6px}
.dp-party{font-size:10px;padding:4px 12px;border-radius:4px;background:var(--bg4);border:1px solid var(--border2);color:var(--text2);transition:all .2s}
.dp-party:hover{border-color:var(--accent);color:var(--accent2)}

/* ─── Destroyed Nation Overlay Markers ─── */
.destruction-marker{position:absolute;transform:translate(-50%,-50%);pointer-events:none;z-index:22}
.destruction-fire{position:absolute;width:6px;height:6px;border-radius:50%;animation:fireFlicker 0.3s ease-in-out infinite alternate}
@keyframes fireFlicker{0%{opacity:0.6;transform:scale(1)}100%{opacity:1;transform:scale(1.4)}}
.destruction-smoke{position:absolute;width:10px;height:10px;border-radius:50%;background:rgba(80,60,40,0.4);animation:smokeRise 3s ease-out infinite;pointer-events:none}
@keyframes smokeRise{0%{opacity:0.5;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-40px) scale(2.5)}}
.destroyed-label{position:absolute;transform:translate(-50%,-50%);pointer-events:none;z-index:23;font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--red);text-shadow:0 0 8px rgba(248,81,73,0.6),0 0 16px rgba(248,81,73,0.3);animation:destroyedPulse 2s ease-in-out infinite}
@keyframes destroyedPulse{0%,100%{opacity:0.7}50%{opacity:1}}

/* ─── Animations ─── */
@keyframes fadeInUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.conflict-card,.news-item{animation:fadeInUp .3s ease-out backwards}

/* ─── Mobile ─── */
@media(max-width:900px){
  .app{grid-template-columns:1fr}
  .sidebar{position:fixed;top:0;right:0;bottom:0;width:85%;max-width:400px;transform:translateX(100%);z-index:200;box-shadow:-8px 0 40px rgba(0,0,0,.5)}
  .sidebar.open{transform:translateX(0)}
  .mobile-toggle{display:flex}
  .mobile-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:199;backdrop-filter:blur(4px)}
  .mobile-overlay.visible{display:block}
  .detail-panel{right:0}
  .stats-row{display:none}
  .legend{flex-wrap:wrap;bottom:12px;left:12px;gap:8px;padding:8px 12px}
  .dp-grid{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:600px){
  .legend{display:none}
  .top-bar{padding:8px 12px}
  .logo-text{font-size:9px;letter-spacing:1.5px}
}

function latLngToVec3(lat, lng, r){
  const phi = (90 - lat) * Math.PI / 180;
  const theta = (lng + 180) * Math.PI / 180;
  return new THREE.Vector3(
    -r * Math.sin(phi) * Math.cos(theta),
     r * Math.cos(phi),
     r * Math.sin(phi) * Math.sin(theta)
  );
}

function initGlobe(){
  const container = document.getElementById('globeArea');
  const canvas = document.getElementById('globeCanvas');
  const W = container.clientWidth;
  const H = container.clientHeight;

  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(45, W/H, 0.1, 100);
  camera.position.set(0, 0, currentDist);

  renderer = new THREE.WebGLRenderer({canvas, antialias:true, alpha:true});
  renderer.setSize(W, H);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setClearColor(0x070a0f, 1);

  raycaster = new THREE.Raycaster();
  clock = new THREE.Clock();
  _tempPos = new THREE.Vector3();
  _tempViewDir = new THREE.Vector3();
  _tempNormal = new THREE.Vector3();

  // Stars
  const starsGeo = new THREE.BufferGeometry();
  const starPos = new Float32Array(4000 * 3);
  for(let i = 0; i < 4000; i++){
    const r = 15 + Math.random() * 35;
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    starPos[i*3] = r * Math.sin(phi) * Math.cos(theta);
    starPos[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
    starPos[i*3+2] = r * Math.cos(phi);
  }
  starsGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
  scene.add(new THREE.Points(starsGeo, new THREE.PointsMaterial({color:0x8899bb, size:0.03, sizeAttenuation:true, transparent:true, opacity:0.6})));

  // Globe group (holds globe mesh + markers)
  globeGroup = new THREE.Group();
  scene.add(globeGroup);

  // Globe mesh — start with dark placeholder, textures load async
  const globeGeo = new THREE.SphereGeometry(globeRadius, 128, 64);
  const globeMat = new THREE.MeshPhongMaterial({color:0x1a2a3a, emissive:0x0a1018, specular:0x222244, shininess:15});
  globeMesh = new THREE.Mesh(globeGeo, globeMat);
  globeGroup.add(globeMesh);

  // Load NASA Blue Marble earth texture
  loadEarthTextures();

  // Atmosphere
  const atmosGeo = new THREE.SphereGeometry(globeRadius * 1.018, 64, 32);
  const atmosMat = new THREE.ShaderMaterial({
    vertexShader: `varying vec3 vNormal; void main(){ vNormal = normalize(normalMatrix * normal); gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0); }`,
    fragmentShader: `varying vec3 vNormal; void main(){ float i = pow(0.65 - dot(vNormal, vec3(0,0,1.0)), 2.5); gl_FragColor = vec4(0.3, 0.45, 1.0, 1.0) * i * 0.5; }`,
    blending: THREE.AdditiveBlending,
    side: THREE.BackSide,
    transparent: true
  });
  atmosMesh = new THREE.Mesh(atmosGeo, atmosMat);
  scene.add(atmosMesh);

  // Lighting — brighter to show satellite texture detail
  scene.add(new THREE.AmbientLight(0x889aaa, 1.0));
  const dl = new THREE.DirectionalLight(0xddeeff, 1.1);
  dl.position.set(5, 3, 5);
  scene.add(dl);
  const dl2 = new THREE.DirectionalLight(0x556688, 0.5);
  dl2.position.set(-3, -2, -3);
  scene.add(dl2);

  // Load countries
  loadCountries();

  // Events — both left and right click drag
  const cv = canvas;
  cv.addEventListener('pointerdown', onPointerDown);
  cv.addEventListener('pointermove', onPointerMove);
  cv.addEventListener('pointerup', onPointerUp);
  cv.addEventListener('pointerleave', onPointerUp);
  cv.addEventListener('wheel', onWheel, {passive:false});
  cv.addEventListener('dblclick', onDblClick);
  cv.addEventListener('contextmenu', e => e.preventDefault()); // prevent right-click menu

  // Apply initial rotation
  applyRotation();
  animate();
}

function applyRotation(){
  // Convert lon/lat to Euler rotation of the globe group
  const lonRad = rotLon * Math.PI / 180;
  const latRad = rotLat * Math.PI / 180;
  globeGroup.rotation.set(latRad, lonRad, 0, 'YXZ');
}

// ─── Load Earth Textures (NASA Blue Marble + bump — applied directly, no canvas compositing) ───
function loadEarthTextures(){
  const loader = new THREE.TextureLoader();
  const earthTexUrl = 'https://unpkg.com/three-globe@2.31.1/example/img/earth-blue-marble.jpg';
  const bumpTexUrl = 'https://unpkg.com/three-globe@2.31.1/example/img/earth-topology.png';
  const waterTexUrl = 'https://unpkg.com/three-globe@2.31.1/example/img/earth-water.png';

  let earthTex = null, bumpTex = null, specTex = null;
  function tryApply(){
    if(!earthTex) return;
    const matOpts = {
      map: earthTex,
      specular: new THREE.Color(0x444466),
      shininess: 22,
      emissive: new THREE.Color(0x0a0e14),
      emissiveIntensity: 0.4
    };
    if(bumpTex){ matOpts.bumpMap = bumpTex; matOpts.bumpScale = 0.02; }
    if(specTex){ matOpts.specularMap = specTex; } // water reflections
    globeMesh.material = new THREE.MeshPhongMaterial(matOpts);
    globeMesh.material.needsUpdate = true;
  }

  loader.load(earthTexUrl, (tex) => {
    tex.anisotropy = renderer.capabilities.getMaxAnisotropy();
    earthTex = tex;
    tryApply();
  });
  loader.load(bumpTexUrl, (tex) => { bumpTex = tex; tryApply(); });
  loader.load(waterTexUrl, (tex) => { specTex = tex; tryApply(); });
}

// ─── Load & Draw Countries as 3D Vector Graphics ───
// Full vector pipeline: polygon fills + border lines + graticules + labels
// Everything is true 3D geometry → infinitely sharp at any zoom level

function loadCountries(){
  // Load both resolutions in parallel for LOD switching
  const load50 = fetch("https://cdn.jsdelivr.net/npm/world-atlas@2/countries-50m.json")
    .then(r => { if(!r.ok) throw new Error(); return r.json(); })
    .then(w => { topoWorld50m = w; return w; })
    .catch(() => null);

  const load110 = fetch("https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json")
    .then(r => r.json())
    .then(w => { topoWorld110m = w; return w; })
    .catch(() => null);

  Promise.all([load50, load110]).then(([w50, w110]) => {
    const world = w50 || w110;
    if(!world) { createMarkers(); return; }
    processTopoJSON(world);
  });
}

function processTopoJSON(world){
  const geojson = topojson.feature(world, world.objects.countries);
  const bordersMesh = topojson.mesh(world, world.objects.countries, (a, b) => a !== b);
  const coastlineMesh = topojson.mesh(world, world.objects.countries, (a, b) => a === b);

  drawVectorCountryFills(geojson);
  drawVectorBorders(bordersMesh, coastlineMesh);
  drawVectorGraticule();
  createMarkers(); // also calls createConflictZones() and createHeatGlow()
}

// ─── Vector Country Polygon Fills ───
// Triangulates each country polygon and renders as a mesh on the globe surface
// Result: crisp filled countries at ANY zoom level (no raster texture needed)

function drawVectorCountryFills(geojson){
  countryFills.forEach(m => { globeGroup.remove(m); m.geometry.dispose(); m.material.dispose(); });
  countryFills = [];

  const fillR = globeRadius * 1.0002;
  const landColor = new THREE.Color('#1a2a3a');
  const hoverColor = new THREE.Color('#182436');

  geojson.features.forEach(feature => {
    const coords = feature.geometry.type === 'Polygon'
      ? [feature.geometry.coordinates]
      : feature.geometry.type === 'MultiPolygon'
        ? feature.geometry.coordinates : [];

    coords.forEach(polygon => {
      const ring = polygon[0]; // outer ring
      if(ring.length < 4) return;

      // Convert ring to 3D points on sphere
      const pts3d = ring.map(c => latLngToVec3(c[1], c[0], fillR));

      // Fan triangulation from first vertex (works for convex-ish polygons on globe)
      const vertices = [];
      for(let i = 1; i < pts3d.length - 2; i++){
        vertices.push(pts3d[0].x, pts3d[0].y, pts3d[0].z);
        vertices.push(pts3d[i].x, pts3d[i].y, pts3d[i].z);
        vertices.push(pts3d[i+1].x, pts3d[i+1].y, pts3d[i+1].z);
      }
      if(vertices.length === 0) return;

      const geo = new THREE.BufferGeometry();
      geo.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
      geo.computeVertexNormals();

      const mat = new THREE.MeshBasicMaterial({
        color: landColor,
        transparent: true,
        opacity: 0.08,
        side: THREE.DoubleSide,
        depthWrite: false
      });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.userData.countryId = feature.id || feature.properties?.name || 'unknown';
      mesh.userData.countryName = COUNTRY_NAMES[feature.id] || feature.properties?.name || '';
      globeGroup.add(mesh);
      countryFills.push(mesh);
    });
  });
}

// ─── Vector Border Lines ───
function drawVectorBorders(bordersMesh, coastlineMesh){
  borderLines.forEach(l => { globeGroup.remove(l); l.geometry.dispose(); l.material.dispose(); });
  borderLines = [];

  const borderR = globeRadius * 1.0008;
  const coastR = globeRadius * 1.0006;

  function geoToLines(geoMesh, radius, color, opacity){
    const geometries = geoMesh.type === 'MultiLineString'
      ? geoMesh.coordinates : [geoMesh.coordinates];

    geometries.forEach(lineCoords => {
      const points = [];
      for(let i = 0; i < lineCoords.length; i++){
        const [lng, lat] = lineCoords[i];
        points.push(latLngToVec3(lat, lng, radius));
      }
      if(points.length < 2) return;

      const geo = new THREE.BufferGeometry().setFromPoints(points);
      const mat = new THREE.LineBasicMaterial({
        color: new THREE.Color(color),
        transparent: true,
        opacity: opacity
      });
      const line = new THREE.Line(geo, mat);
      line.userData.baseOpacity = opacity;
      globeGroup.add(line);
      borderLines.push(line);
    });
  }

  geoToLines(coastlineMesh, coastR, '#3a5a7a', 0.55);
  geoToLines(bordersMesh, borderR, '#2a4565', 0.35);
}

// ─── Vector Graticule Grid ───
// Lat/lon lines rendered as 3D geometry — sharp at any zoom
function drawVectorGraticule(){
  graticuleLines.forEach(l => { globeGroup.remove(l); l.geometry.dispose(); l.material.dispose(); });
  graticuleLines = [];

  const gridR = globeRadius * 1.0001;
  const color = new THREE.Color('#1a2535');
  const step = 30; // degrees between lines

  // Latitude lines (circles at fixed lat)
  for(let lat = -60; lat <= 60; lat += step){
    const pts = [];
    for(let lng = -180; lng <= 180; lng += 3){
      pts.push(latLngToVec3(lat, lng, gridR));
    }
    const geo = new THREE.BufferGeometry().setFromPoints(pts);
    const mat = new THREE.LineBasicMaterial({color, transparent:true, opacity:0.15});
    const line = new THREE.Line(geo, mat);
    line.userData.baseOpacity = 0.15;
    globeGroup.add(line);
    graticuleLines.push(line);
  }

  // Longitude lines (great circle arcs at fixed lng)
  for(let lng = -180; lng < 180; lng += step){
    const pts = [];
    for(let lat = -90; lat <= 90; lat += 3){
      pts.push(latLngToVec3(lat, lng, gridR));
    }
    const geo = new THREE.BufferGeometry().setFromPoints(pts);
    const mat = new THREE.LineBasicMaterial({color, transparent:true, opacity:0.15});
    const line = new THREE.Line(geo, mat);
    line.userData.baseOpacity = 0.15;
    globeGroup.add(line);
    graticuleLines.push(line);
  }

  // Equator + Prime Meridian (brighter)
  [0].forEach(lat => {
    const pts = [];
    for(let lng = -180; lng <= 180; lng += 2){
      pts.push(latLngToVec3(lat, lng, gridR * 1.0001));
    }
    const geo = new THREE.BufferGeometry().setFromPoints(pts);
    const mat = new THREE.LineBasicMaterial({color: new THREE.Color('#2a3d55'), transparent:true, opacity:0.3});
    const line = new THREE.Line(geo, mat);
    line.userData.baseOpacity = 0.3;
    globeGroup.add(line);
    graticuleLines.push(line);
  });
}

function createConflictZones(){
  conflictZones.forEach(z => { globeGroup.remove(z); if(z.geometry) z.geometry.dispose(); if(z.material) z.material.dispose(); });
  conflictZones = [];

  const zoneR = globeRadius * 1.0003;

  CONFLICT_ZONES.forEach(zone => {
    const color = new THREE.Color(intensityColor(zone.intensity));
    const pts = zone.points.map(p => latLngToVec3(p[1], p[0], zoneR));

    // Fill
    const vertices = [];
    for(let i = 1; i < pts.length - 2; i++){
      vertices.push(pts[0].x, pts[0].y, pts[0].z);
      vertices.push(pts[i].x, pts[i].y, pts[i].z);
      vertices.push(pts[i+1].x, pts[i+1].y, pts[i+1].z);
    }
    if(vertices.length > 0){
      const geo = new THREE.BufferGeometry();
      geo.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
      const mat = new THREE.MeshBasicMaterial({
        color, transparent:true, opacity:0.04, side:THREE.DoubleSide, depthWrite:false
      });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.userData.baseOpacity = 0.04;
      globeGroup.add(mesh);
      conflictZones.push(mesh);
    }

    // Outline
    const outlinePts = [...pts, pts[0]]; // close the loop
    const outlineGeo = new THREE.BufferGeometry().setFromPoints(outlinePts);
    const outlineMat = new THREE.LineBasicMaterial({
      color, transparent:true, opacity:0.15
    });
    const outline = new THREE.Line(outlineGeo, outlineMat);
    outline.userData.baseOpacity = 0.15;
    globeGroup.add(outline);
    conflictZones.push(outline);
  });
}

// ─── Markers (HTML/CSS Overlay) ───
let htmlMarkerData = []; // holds logic state for html markers

function createMarkers(){
  const container = document.getElementById('htmlMarkers');
  container.innerHTML = '';
  htmlMarkerData = [];
  const filtered = getFiltered();
  if(filtered.length === 0) return; // No conflicts in game mode
  const maxDeaths = Math.max(...CONFLICTS.map(c=>c.deaths), 1);

  filtered.forEach(c => {
    // Determine visual size based on death toll
    const sizeScale = 0.6 + 0.6 * Math.log10(Math.max(c.deaths,100)) / Math.log10(maxDeaths);
    const basePx = 14 * sizeScale;
    const color = intensityColor(c.intensity);

    const el = document.createElement('div');
    el.className = 'html-marker';
    el.style.width = (basePx * 4) + 'px';
    el.style.height = (basePx * 4) + 'px';

    const core = document.createElement('div');
    core.className = 'html-marker-core';
    core.style.width = basePx + 'px';
    core.style.height = basePx + 'px';
    core.style.background = color;
    core.style.boxShadow = `0 0 10px ${color}`;

    const glow = document.createElement('div');
    glow.className = 'html-marker-glow';
    glow.style.width = (basePx * 2.2) + 'px';
    glow.style.height = (basePx * 2.2) + 'px';
    glow.style.background = `${color}33`; // 20% opacity hex

    const ring = document.createElement('div');
    ring.className = 'html-marker-ring';
    ring.style.width = (basePx * 1.5) + 'px';
    ring.style.height = (basePx * 1.5) + 'px';
    ring.style.borderColor = color;

    el.appendChild(glow);
    el.appendChild(ring);
    el.appendChild(core);

    if(c.nuclearRisk){
      const nuke = document.createElement('div');
      nuke.className = 'html-marker-nuke';
      nuke.style.width = (basePx * 3.0) + 'px';
      nuke.style.height = (basePx * 3.0) + 'px';
      el.appendChild(nuke);
    }

    // Interactions
    el.addEventListener('pointerenter', () => {
      if(!pointerDown) updateTooltip(c);
    });
    el.addEventListener('pointerleave', () => {
      updateTooltip(null);
    });
    el.addEventListener('pointerdown', (e) => {
      e.stopPropagation(); // prevent globe drag
    });
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      selectConflict(c.id);
    });

    container.appendChild(el);

    // 3D true position on the globe surface
    const pos3d = latLngToVec3(c.lat, c.lng, globeRadius * 1.01);

    htmlMarkerData.push({
      conflict: c,
      el: el,
      ring: ring,
      glow: glow,
      pos3d: pos3d,
      screenPos: new THREE.Vector2(), // true projected pos
      repelPos: new THREE.Vector2(),  // physical pushed pos
      basePx: basePx,
      visible: true
    });
  });

  if(showHeat) createHeatGlow();
  createConflictZones();
}

// ─── Connection Arcs ───

function createArcs(){
  arcObjects.forEach(a => { globeGroup.remove(a); a.geometry.dispose(); a.material.dispose(); });
  arcObjects = [];
  if(!showArcs) return;

  const filtered = getFiltered();
  const filteredIds = new Set(filtered.map(c=>c.id));
  const drawn = new Set();

  filtered.forEach(c => {
    if(!c.related) return;
    c.related.forEach(rid => {
      if(!filteredIds.has(rid)) return;
      const key = [Math.min(c.id,rid), Math.max(c.id,rid)].join('-');
      if(drawn.has(key)) return;
      drawn.add(key);

      const other = CONFLICTS.find(x=>x.id===rid);
      if(!other) return;

      const p1 = latLngToVec3(c.lat, c.lng, globeRadius * 1.002);
      const p2 = latLngToVec3(other.lat, other.lng, globeRadius * 1.002);

      // Create curved arc via midpoint pushed outward
      const mid = new THREE.Vector3().addVectors(p1, p2).multiplyScalar(0.5);
      const dist = p1.distanceTo(p2);
      const height = globeRadius + dist * 0.3;
      mid.normalize().multiplyScalar(height);

      const curve = new THREE.QuadraticBezierCurve3(p1, mid, p2);
      const points = curve.getPoints(40);
      const geo = new THREE.BufferGeometry().setFromPoints(points);
      const mat = new THREE.LineBasicMaterial({color:0x7c72ff, transparent:true, opacity:0.25, linewidth:1});
      const line = new THREE.Line(geo, mat);
      globeGroup.add(line);
      arcObjects.push(line);
    });
  });
}

// ─── Heat Glow ───
function createHeatGlow(){
  heatObjects.forEach(h => { globeGroup.remove(h); h.geometry.dispose(); h.material.dispose(); });
  heatObjects = [];
  if(!showHeat) return;

  const filtered = getFiltered();
  filtered.forEach(c => {
    const pos = latLngToVec3(c.lat, c.lng, globeRadius * 1.001);
    const color = new THREE.Color(intensityColor(c.intensity));
    // Size based on displaced (humanitarian impact)
    const heatSize = 0.04 + Math.min(c.displaced / 3000000, 1) * 0.08;
    const geo = new THREE.CircleGeometry(heatSize, 32);
    const mat = new THREE.MeshBasicMaterial({color, transparent:true, opacity:0.08, side:THREE.DoubleSide});
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.copy(pos);
    mesh.lookAt(0,0,0);
    globeGroup.add(mesh);
    heatObjects.push(mesh);
  });
}

// ─── Pointer Controls with Inertia & Right-Click Support ───
let pointerDown = false, pointerX = 0, pointerY = 0;
let dragDist = 0;
let pinchDist = 0;
const pointers = new Map();
let activeButton = -1; // track which mouse button is active

function onPointerDown(e){
  pointers.set(e.pointerId, {x:e.clientX, y:e.clientY});
  if(pointers.size === 1){
    pointerDown = true;
    dragDist = 0;
    pointerX = e.clientX;
    pointerY = e.clientY;
    activeButton = e.button; // 0=left, 2=right
    lastDragDx = 0;
    lastDragDy = 0;
    lastDragTime = performance.now();
    // Kill any existing inertia
    hasInertia = false;
    velocityLon = 0;
    velocityLat = 0;
    // Stop fly-to animation on user interaction
    isAnimatingTo = false;
    autoRotate = false;
    updateAutoRotateBtn();
    document.getElementById('globeArea').classList.add('dragging');
  } else if(pointers.size === 2){
    const pts = [...pointers.values()];
    pinchDist = Math.hypot(pts[0].x-pts[1].x, pts[0].y-pts[1].y);
  }
  e.target.setPointerCapture(e.pointerId);
}

function onPointerMove(e){
  pointers.set(e.pointerId, {x:e.clientX, y:e.clientY});

  if(pointers.size === 2){
    const pts = [...pointers.values()];
    const newDist = Math.hypot(pts[0].x-pts[1].x, pts[0].y-pts[1].y);
    targetDist -= (newDist - pinchDist) * 0.005;
    targetDist = Math.max(1.5, Math.min(6, targetDist));
    pinchDist = newDist;
    return;
  }

  // Both left-click (button 0) and right-click (button 2) drag to rotate
  if(pointerDown && pointers.size === 1 && (activeButton === 0 || activeButton === 2)){
    const dx = e.clientX - pointerX;
    const dy = e.clientY - pointerY;
    dragDist += Math.abs(dx) + Math.abs(dy);

    // Sensitivity — slightly higher for trackpad feel
    const sensitivity = 0.35;
    targetLon += dx * sensitivity;
    targetLat += dy * sensitivity;
    targetLat = Math.max(-80, Math.min(80, targetLat));

    // Track velocity for inertia
    const now = performance.now();
    const dt = now - lastDragTime;
    if(dt > 0){
      lastDragDx = dx;
      lastDragDy = dy;
      lastDragTime = now;
    }

    pointerX = e.clientX;
    pointerY = e.clientY;
  }
}

function onPointerUp(e){
  const wasDrag = dragDist > 8;
  pointers.delete(e.pointerId);

  if(pointers.size === 0){
    pointerDown = false;
    document.getElementById('globeArea').classList.remove('dragging');

    // Apply inertia from last drag movement
    if(wasDrag){
      const timeSinceLast = performance.now() - lastDragTime;
      if(timeSinceLast < 80){ // only if drag was recent (not a pause-then-release)
        velocityLon = lastDragDx * 0.35;
        velocityLat = lastDragDy * 0.35;
        hasInertia = true;
      }
    }
  }

  // Clicked (not dragged) — check for country click
  if(!wasDrag && pointers.size === 0 && (activeButton === 0)){
    handleCountryClick(e.clientX, e.clientY);
    closeDetail();
  }
  activeButton = -1;
}

function onWheel(e){
  e.preventDefault();
  // deltaMode-aware zoom: 0=pixel (trackpad), 1=line (mouse wheel)
  let delta = e.deltaY;
  if(e.deltaMode === 1) delta *= 16; // line mode → multiply for consistent feel
  // Add to zoom velocity for smooth momentum zoom
  zoomVelocity += delta * 0.0008;
}

function onDblClick(e){
  targetDist = Math.max(1.5, targetDist - 0.5);
}

function updateTooltip(c){
  const tooltip = document.getElementById('tooltip');
  if(c){
    if(hoveredMarker !== c.id){
      hoveredMarker = c.id;
      tooltip.innerHTML = `
        <div class="tt-name"><div class="tt-dot" style="background:${intensityColor(c.intensity)};box-shadow:0 0 6px ${intensityColor(c.intensity)}44"></div>${c.name}${c.nuclearRisk?'<span class="nuke-badge"><span class="nuke-icon"></span>Nuclear</span>':''}</div>
        <div class="tt-region">${c.region} &middot; ${c.intensity}</div>
        <div class="tt-summary">${c.summary.substring(0,140)}${c.summary.length>140?'...':''}</div>
        <div class="tt-stats">
          <div class="tt-stat">Deaths: <span>${formatNum(c.deaths)}</span></div>
          <div class="tt-stat">Displaced: <span>${formatNum(c.displaced)}</span></div>
        </div>`;
    }
    const htmlObj = htmlMarkerData.find(m => m.conflict.id === c.id);
    if(htmlObj){
      const ttW = 280;
      let left = htmlObj.repelPos.x + 24;
      let top = htmlObj.repelPos.y - 40;
      if(left + ttW > window.innerWidth) left = htmlObj.repelPos.x - ttW - 24;
      if(top + 160 > window.innerHeight) top = window.innerHeight - 170;
      if(top < 10) top = 10;
      tooltip.style.left = left + 'px';
      tooltip.style.top = top + 'px';
      tooltip.classList.add('visible');
    }
  } else {
    if(hoveredMarker !== null){
      hoveredMarker = null;
      tooltip.classList.remove('visible');
    }
  }
}

// ─── Smooth Fly-To (shortest path, no wild spinning) ───
function flyToConflict(c){
  // Target: rotate globe so conflict faces camera
  // The conflict is at (lat, lng). To face camera, globe must rotate so that
  // its lon rotation = -lng and lat rotation = lat
  animStartLon = rotLon;
  animStartLat = rotLat;
  animStartDist = currentDist;
  animEndLon = -90 - c.lng;
  animEndLat = c.lat;
  animEndDist = 2.0;

  // Normalize longitude difference to [-180, 180] for shortest path
  let dLon = animEndLon - animStartLon;
  while(dLon > 180) dLon -= 360;
  while(dLon < -180) dLon += 360;
  animEndLon = animStartLon + dLon;

  animProgress = 0;
  isAnimatingTo = true;
  autoRotate = false;
  updateAutoRotateBtn();
}

// Ease in-out cubic
function easeInOutCubic(t){
  return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2, 3)/2;
}

// ─── Animation Loop ───
function animate(){
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();
  const dt = Math.min(clock.getDelta(), 0.05);

  // Fly-to animation
  if(isAnimatingTo){
    animProgress = Math.min(1, animProgress + 0.02);
    const ease = easeInOutCubic(animProgress);
    rotLon = animStartLon + (animEndLon - animStartLon) * ease;
    rotLat = animStartLat + (animEndLat - animStartLat) * ease;
    currentDist = animStartDist + (animEndDist - animStartDist) * ease;
    targetLon = rotLon;
    targetLat = rotLat;
    targetDist = currentDist;
    if(animProgress >= 1) isAnimatingTo = false;
  } else {
    // Apply inertia momentum
    if(hasInertia && !pointerDown){
      targetLon += velocityLon;
      targetLat += velocityLat;
      targetLat = Math.max(-80, Math.min(80, targetLat));
      velocityLon *= INERTIA_DAMPING;
      velocityLat *= INERTIA_DAMPING;
      if(Math.abs(velocityLon) < INERTIA_MIN && Math.abs(velocityLat) < INERTIA_MIN){
        hasInertia = false;
        velocityLon = 0;
        velocityLat = 0;
      }
    }

    // Apply zoom momentum
    if(Math.abs(zoomVelocity) > 0.0005){
      targetDist += zoomVelocity;
      targetDist = Math.max(1.5, Math.min(6, targetDist));
      zoomVelocity *= ZOOM_DAMPING;
    } else {
      zoomVelocity = 0;
    }

    // Auto-rotate
    if(autoRotate && !hasInertia) targetLon -= 0.06;

    // Smooth interpolation
    rotLon += (targetLon - rotLon) * 0.12;
    rotLat += (targetLat - rotLat) * 0.12;
    currentDist += (targetDist - currentDist) * 0.12;
  }

  // Apply rotation
  applyRotation();
  camera.position.z = currentDist;
  
  // Need view matrix for projection
  globeGroup.updateMatrixWorld();
  const W = renderer.domElement.clientWidth;
  const H = renderer.domElement.clientHeight;
  const hw = W / 2;
  const hh = H / 2;

  // 1. Project 3D positions to 2D screen positions
  let visibleMarkers = [];
  htmlMarkerData.forEach(m => {
    // Copy vector, apply globe transform (reuse pre-allocated vectors)
    const pos = _tempPos.copy(m.pos3d).applyMatrix4(globeGroup.matrixWorld);

    // Check if behind globe (dot product of position and camera direction)
    _tempViewDir.subVectors(camera.position, pos).normalize();
    _tempNormal.copy(pos).normalize();
    const isVisible = _tempNormal.dot(_tempViewDir) > 0.1; // 0.1 margin hides slightly before edge

    m.visible = isVisible;
    if(isVisible){
      pos.project(camera); // Convert to NDC space (-1 to +1)
      m.screenPos.set((pos.x * hw) + hw, -(pos.y * hh) + hh);
      // Initialize repelPos to screenPos every frame
      m.repelPos.copy(m.screenPos);
      visibleMarkers.push(m);
      m.el.classList.remove('hidden');
    } else {
      m.el.classList.add('hidden');
    }
  });

  // 2. Overlap Prevention (2D Repulsion Physics)
  const iterations = 3;
  const minDist = 32; // minimum distance between marker centers
  for(let i = 0; i < iterations; i++){
    for(let a = 0; a < visibleMarkers.length; a++){
      for(let b = a + 1; b < visibleMarkers.length; b++){
        const m1 = visibleMarkers[a];
        const m2 = visibleMarkers[b];
        const dx = m1.repelPos.x - m2.repelPos.x;
        const dy = m1.repelPos.y - m2.repelPos.y;
        const dist = Math.sqrt(dx*dx + dy*dy) || 0.1;
        
        if(dist < minDist){
          // They overlap! Push apart along their axis
          const overlap = minDist - dist;
          const force = overlap / 2;
          const pushX = (dx / dist) * force;
          const pushY = (dy / dist) * force;
          
          m1.repelPos.x += pushX;
          m1.repelPos.y += pushY;
          m2.repelPos.x -= pushX;
          m2.repelPos.y -= pushY;
        }
      }
    }
  }

  // 3. Update DOM positions, animate UI rings, and draw SVG leader lines
  let svgPaths = '';
  htmlMarkerData.forEach((m, i) => {
    if(!m.visible) return;

    // Apply active class if selected
    m.el.classList.toggle('active', activeConflict === m.conflict.id);

    // Apply HTML DOM positions
    m.el.style.left = m.repelPos.x + 'px';
    m.el.style.top = m.repelPos.y + 'px';

    // Animate glow/ring using time
    const phase = t * 1.5 + i * 0.5;
    const pulse = (Math.sin(phase) + 1) / 2;
    const scale = 1 + pulse * 1.5;
    m.ring.style.transform = `scale(${scale})`;
    m.ring.style.opacity = 0.6 * (1 - pulse);
    m.glow.style.opacity = 0.12 + pulse * 0.15;

    // Draw leader line if pushed significantly
    const moved = m.repelPos.distanceTo(m.screenPos);
    if(moved > 2){
      const color = intensityColor(m.conflict.intensity);
      svgPaths += `<line x1="${m.screenPos.x}" y1="${m.screenPos.y}" x2="${m.repelPos.x}" y2="${m.repelPos.y}" stroke="${color}" stroke-width="1.5" stroke-opacity="0.5" stroke-dasharray="2,2"/>`;
      // Draw tiny dot at root origin
      svgPaths += `<circle cx="${m.screenPos.x}" cy="${m.screenPos.y}" r="2" fill="${color}" opacity="0.8"/>`;
    }
  });

  const lb = document.getElementById('leaderLines');
  if(lb.innerHTML !== svgPaths) lb.innerHTML = svgPaths;

  // ─── Zoom-adaptive vector brightness ───
  // As camera gets closer, borders/graticule/zones get brighter & more detailed
  const zoomFactor = Math.max(0, Math.min(1, (2.8 - currentDist) / 1.5)); // 0 at far, 1 at close

  // Borders: brighter on zoom
  borderLines.forEach(l => {
    const base = l.userData.baseOpacity || 0.4;
    l.material.opacity = base + zoomFactor * 0.3;
  });

  // Graticule: more visible on zoom
  graticuleLines.forEach(l => {
    const base = l.userData.baseOpacity || 0.15;
    l.material.opacity = base + zoomFactor * 0.15;
  });

  // Conflict zones: slightly more visible on zoom
  conflictZones.forEach(z => {
    const base = z.userData.baseOpacity || 0.05;
    if(z.isMesh) z.material.opacity = base + zoomFactor * 0.04;
    else z.material.opacity = (z.userData.baseOpacity || 0.15) + zoomFactor * 0.15;
  });

  // Country fills: subtle tint, slightly more visible on zoom
  countryFills.forEach(f => {
    f.material.opacity = 0.06 + zoomFactor * 0.06;
  });

  // Animate heat glow
  if(showHeat){
    heatObjects.forEach((h, i) => {
      const pulse = (Math.sin(t * 0.8 + i * 0.7) + 1) / 2;
      h.material.opacity = 0.05 + pulse * 0.06;
    });
  }

  // Animate arcs
  if(showArcs){
    arcObjects.forEach((a, i) => {
      const pulse = (Math.sin(t * 1.2 + i) + 1) / 2;
      a.material.opacity = 0.12 + pulse * 0.18;
    });
  }

  // ─── Game updates (missiles, explosions, city markers) ───
  var gdt = 0.016; // ~60fps timestep
  if(typeof updateMissiles === 'function') updateMissiles(gdt);
  if(typeof updateExplosions === 'function') updateExplosions(gdt);
  if(typeof updateExplosionsV3 === 'function') updateExplosionsV3(gdt);
  if(typeof updateCityMarkerPositions === 'function' && typeof cityMarkerEls !== 'undefined' && cityMarkerEls.length > 0) updateCityMarkerPositions();
  if(typeof updateDestructionEffects === 'function' && destroyedNationIds.size > 0) updateDestructionEffects(t);

  renderer.render(scene, camera);
}

function updateCityMarkerPositions(){
  var W = renderer.domElement.clientWidth;
  var H = renderer.domElement.clientHeight;
  var hw = W / 2;
  var hh = H / 2;
  cityMarkerEls.forEach(function(m, i){
    var pos = _tempPos.copy(cityMarker3Ds[i]).applyMatrix4(globeGroup.matrixWorld);
    // Visibility: check if marker is on the visible side of the globe
    _tempViewDir.subVectors(camera.position, pos).normalize();
    _tempNormal.copy(pos).normalize();
    var isVisible = _tempNormal.dot(_tempViewDir) > 0.1;
    if(isVisible){
      pos.project(camera);
      var x = (pos.x * hw) + hw;
      var y = -(pos.y * hh) + hh;
      m.el.style.left = x + 'px';
      m.el.style.top = y + 'px';
      m.el.classList.remove('hidden');
    } else {
      m.el.classList.add('hidden');
    }
  });
}

function addTarget(nationId, cityIdx){
  if(gamePhase !== 'PLAYING') return;
  if(playerNation.warheads <= targetQueue.length){
    addLog('⚠ No warheads remaining!'); return;
  }
  var exists = targetQueue.find(function(t){ return t.nationId===nationId && t.cityIdx===cityIdx; });
  if(exists){ removeTarget(nationId, cityIdx); return; }
  var nation = liveNations.find(function(n){ return n.id===nationId; });
  var city = nation.cities[cityIdx];
  if(city.pop <= 0){ addLog('City already destroyed.'); return; }
  targetQueue.push({nationId:nationId, cityIdx:cityIdx});
  addLog('🎯 Targeting ' + city.name + ', ' + nation.name);
  renderTargetQueue();
  renderGlobalStats();
}

function removeTarget(nationId, cityIdx){
  targetQueue = targetQueue.filter(function(t){ return !(t.nationId===nationId && t.cityIdx===cityIdx); });
  renderTargetQueue();
  renderGlobalStats();
}

function launchMissiles(){
  if(gamePhase !== 'PLAYING' || targetQueue.length === 0) return;
  gamePhase = 'LAUNCHING';
  document.getElementById('gamePhaseHeader').innerHTML = '☢ MISSILES INBOUND...';
  document.getElementById('gamePhaseHeader').style.color = 'var(--red)';
  document.getElementById('launchBtn').style.display = 'none';
  addLog('🚀 LAUNCHING ' + targetQueue.length + ' WARHEADS!');
  playerNation.warheads -= targetQueue.length;
  updatePlayerHUD();
  var delay = 0;
  targetQueue.forEach(function(t){
    var nation = liveNations.find(function(n){ return n.id===t.nationId; });
    var city = nation.cities[t.cityIdx];
    var fromCity = playerNation.cities[0];
    setTimeout(function(){ launchOneMissile(fromCity, city, nation, t.cityIdx); }, delay);
    delay += 400;
  });
  var totalDelay = delay;
  setTimeout(function(){
    targetQueue = [];
    renderTargetQueue();
    setTimeout(aiTurn, 1500);
  }, totalDelay + 3000);
}

function launchOneMissile(from, to, targetNation, cityIdx){
  var startPos = latLngToVec3(from.lat, from.lng, globeRadius * 1.002);
  var endPos = latLngToVec3(to.lat, to.lng, globeRadius * 1.002);
  var mid = startPos.clone().add(endPos).multiplyScalar(0.5).normalize().multiplyScalar(globeRadius * 1.4);
  var curve = new THREE.QuadraticBezierCurve3(startPos, mid, endPos);
  var pts = curve.getPoints(60);
  var geo = new THREE.BufferGeometry().setFromPoints(pts);
  var mat = new THREE.LineBasicMaterial({color:0xff4444, transparent:true, opacity:0.6});
  var line = new THREE.Line(geo, mat);
  globeGroup.add(line);
  var dotGeo = new THREE.SphereGeometry(0.008, 8, 8);
  var dotMat = new THREE.MeshBasicMaterial({color:0xff8844});
  var dot = new THREE.Mesh(dotGeo, dotMat);
  globeGroup.add(dot);
  missileFlights.push({line:line, dot:dot, curve:curve, t:0, targetNation:targetNation, cityIdx:cityIdx, to:to, done:false});
}

function updateMissiles(dt){
  missileFlights.forEach(function(f){
    if(f.done) return;
    f.t += dt * 0.4;
    if(f.t >= 1){
      f.t = 1; f.done = true;
      globeGroup.remove(f.dot); globeGroup.remove(f.line);
      f.dot.geometry.dispose(); f.dot.material.dispose();
      f.line.geometry.dispose(); f.line.material.dispose();
      var defended = Math.random() < f.targetNation.defense * 0.3;
      if(defended){
        addLog('🛡 ' + f.targetNation.flag + ' intercepted strike on ' + f.to.name + '!');
      } else {
        triggerExplosion(f.to.lat, f.to.lng, f.to, f.targetNation, f.cityIdx);
      }
    } else {
      var pt = f.curve.getPoint(f.t);
      f.dot.position.copy(pt);
    }
  });
  missileFlights = missileFlights.filter(function(f){ return !f.done; });
}

function triggerExplosion(lat, lng, city, nation, cityIdx){
  // ── Game logic: damage, kills, HUD ──
  var kills = Math.round(city.pop * (0.4 + Math.random() * 0.4));
  nation.cities[cityIdx].pop = Math.max(0, city.pop - kills);
  totalKills += kills;
  addLog('💥 ' + city.name + ' hit! ' + formatNum(kills) + ' casualties.');

  // ── Use V3 explosion system (globe-only, no screen flash) ──
  triggerExplosionV3(lat, lng);

  // ── Check if nation is fully destroyed ──
  checkNationDestroyed(nation);

  updatePlayerHUD();
  renderGlobalStats();
  createCityMarkers();
}

function updateExplosions(dt){
  explosions.forEach(function(e){
    e.t += dt;

    // ── LIGHT BEAM: shoots up fast, holds, fades ──
    if(e.type === 'beam'){
      var beamLife = 0.8;
      if(e.t < 0.12){
        var rise = e.t / 0.12;
        e.mesh.scale.set(1, rise, 1);
        e.mesh.material.opacity = 1.0;
      } else {
        var fadeT = (e.t - 0.12) / (beamLife - 0.12);
        e.mesh.material.opacity = Math.max(0, 1.0 - fadeT * fadeT);
        var widen = 1 + fadeT * 3;
        e.mesh.scale.set(widen, 1, widen);
      }
      if(e.t > beamLife){
        globeGroup.remove(e.mesh); e.mesh.geometry.dispose(); e.mesh.material.dispose(); e.done = true;
      }
    }

    if(e.type === 'beam_glow'){
      var life = 0.7;
      var fade = Math.max(0, 1 - e.t / life);
      e.mesh.material.opacity = 0.35 * fade;
      var s = 1 + e.t * 2;
      e.mesh.scale.set(s, 1, s);
      if(e.t > life){
        globeGroup.remove(e.mesh); e.mesh.geometry.dispose(); e.mesh.material.dispose(); e.done = true;
      }
    }

    // ── DETONATION FLASH: rapid expand + vanish ──
    if(e.type === 'detonation'){
      var s = 1 + e.t * 25;
      e.mesh.scale.set(s, s, s);
      e.mesh.material.opacity = Math.max(0, 1 - e.t * 3.5);
      if(e.t > 0.35){
        globeGroup.remove(e.mesh); e.mesh.geometry.dispose(); e.mesh.material.dispose(); e.done = true;
      }
    }

    // ── EXPANSION WAVES: large rings racing outward ──
    if(e.type === 'expansion_wave'){
      var speed = 25 - e.waveIdx * 4;
      var s = 1 + e.t * speed;
      e.mesh.scale.set(s, s, s);
      var life = 1.0 + e.waveIdx * 0.25;
      e.mesh.material.opacity = Math.max(0, (0.85 - e.waveIdx*0.12) * (1 - e.t / life));
      if(e.t > life){
        globeGroup.remove(e.mesh); e.mesh.geometry.dispose(); e.mesh.material.dispose(); e.done = true;
      }
    }

    // ── FIREBALL: grows, rises, color shifts orange→red→dark ──
    if(e.type === 'fireball'){
      var s = 1 + e.t * 4;
      e.mesh.scale.set(s, s, s);
      var riseAmt = Math.min(e.t * 0.06, 0.08);
      e.mesh.position.copy(e.basePos.clone().add(e.normal.clone().multiplyScalar(0.02 + riseAmt)));
      var r = e.t < 0.4 ? 1.0 : Math.max(0.2, 1.0 - (e.t - 0.4) * 1.0);
      var g = Math.max(0, 0.6 - e.t * 0.5);
      e.mesh.material.color.setRGB(r, g, 0);
      e.mesh.material.opacity = Math.max(0, 0.9 - e.t * 0.45);
      if(e.t > 2.0){
        globeGroup.remove(e.mesh); e.mesh.geometry.dispose(); e.mesh.material.dispose(); e.done = true;
      }
    }

    if(e.type === 'fireball_core'){
      var s = 1 + e.t * 3;
      e.mesh.scale.set(s, s, s);
      var riseAmt = Math.min(e.t * 0.06, 0.08);
      e.mesh.position.copy(e.basePos.clone().add(e.normal.clone().multiplyScalar(0.02 + riseAmt)));
      e.mesh.material.opacity = Math.max(0, 0.95 - e.t * 1.2);
      if(e.t > 0.9){
        globeGroup.remove(e.mesh); e.mesh.geometry.dispose(); e.mesh.material.dispose(); e.done = true;
      }
    }

    // ── MUSHROOM STEM: segments rise to form thick column (1 sec rise) ──
    if(e.type === 'mushroom_stem'){
      var riseDuration = 1.0;
      var riseT = Math.min(e.t / riseDuration, 1);
      // Ease-out for smooth rise
      var easedT = 1 - Math.pow(1 - riseT, 2);
      var height = e.targetHeight * easedT;
      e.mesh.position.copy(e.basePos.clone().add(e.normal.clone().multiplyScalar(height)));
      // Widen as it rises
      var stemWidth = 0.6 + easedT * 1.0 + (e.segIdx / e.totalSegs) * 0.5;
      e.mesh.scale.set(stemWidth, stemWidth, stemWidth);
      e.mesh.material.opacity = Math.max(0, 0.65 - Math.max(0, e.t - 1.5) * 0.18);
      if(e.t > 5){
        globeGroup.remove(e.mesh); e.mesh.geometry.dispose(); e.mesh.material.dispose(); e.done = true;
      }
    }

    // ── MUSHROOM CAP: spheres cluster at top, spread outward ──
    if(e.type === 'mushroom_cap'){
      var riseDuration = 1.2;
      var riseT = Math.min(e.t / riseDuration, 1);
      var easedT = 1 - Math.pow(1 - riseT, 2);
      var height = e.targetHeight * easedT;
      // Tangent vectors for spread
      var tangent1 = new THREE.Vector3(1,0,0).cross(e.normal).normalize();
      if(tangent1.length() < 0.1) tangent1 = new THREE.Vector3(0,1,0).cross(e.normal).normalize();
      var tangent2 = e.normal.clone().cross(tangent1).normalize();
      var spreadAmt = e.capSpread * easedT;
      var offset = e.normal.clone().multiplyScalar(height)
        .add(tangent1.clone().multiplyScalar(Math.cos(e.capAngle) * spreadAmt))
        .add(tangent2.clone().multiplyScalar(Math.sin(e.capAngle) * spreadAmt));
      e.mesh.position.copy(e.basePos.clone().add(offset));
      var s = 0.3 + easedT * 1.5;
      e.mesh.scale.set(s, s * 0.65, s);  // oblate
      e.mesh.material.opacity = Math.max(0, 0.6 - Math.max(0, e.t - 2) * 0.15);
      if(e.t > 5.5){
        globeGroup.remove(e.mesh); e.mesh.geometry.dispose(); e.mesh.material.dispose(); e.done = true;
      }
    }

    // ── MUSHROOM DOME: bright top glow ──
    if(e.type === 'mushroom_dome'){
      var riseDuration = 1.3;
      var riseT = Math.min(e.t / riseDuration, 1);
      var easedT = 1 - Math.pow(1 - riseT, 2);
      var height = 0.4 * easedT;
      e.mesh.position.copy(e.basePos.clone().add(e.normal.clone().multiplyScalar(height)));
      var s = 0.2 + easedT * 1.5;
      e.mesh.scale.set(s, s * 0.55, s);
      e.mesh.material.opacity = Math.max(0, 0.45 - Math.max(0, e.t - 1.5) * 0.1);
      var bright = Math.max(0.3, 1 - e.t * 0.2);
      e.mesh.material.color.setRGB(bright, bright * 0.55, bright * 0.15);
      if(e.t > 5.5){
        globeGroup.remove(e.mesh); e.mesh.geometry.dispose(); e.mesh.material.dispose(); e.done = true;
      }
    }

    // ── DEBRIS: particles with physics ──
    if(e.type === 'debris'){
      e.mesh.position.add(e.vel);
      var gravity = e.mesh.position.clone().normalize().multiplyScalar(-0.00012);
      e.vel.add(gravity);
      e.vel.multiplyScalar(0.982);
      e.mesh.material.opacity = Math.max(0, 0.85 - e.t * 0.35);
      var s = Math.max(0.2, 1 - e.t * 0.25);
      e.mesh.scale.set(s, s, s);
      if(e.t > 3){
        globeGroup.remove(e.mesh); e.mesh.geometry.dispose(); e.mesh.material.dispose(); e.done = true;
      }
    }

    // ── EMBER: lingering glow, slow pulse + fade ──
    if(e.type === 'ember'){
      var pulse = 0.3 + Math.sin(e.t * 2) * 0.1;
      e.mesh.material.opacity = Math.max(0, pulse - e.t * 0.025);
      var s = 1 + e.t * 0.15;
      e.mesh.scale.set(s, s, s);
      if(e.t > 10){
        globeGroup.remove(e.mesh); e.mesh.geometry.dispose(); e.mesh.material.dispose(); e.done = true;
      }
    }
  });
  explosions = explosions.filter(function(e){ return !e.done; });
}
function aiTurn(){
  gamePhase = 'AI_TURN';
  document.getElementById('gamePhaseHeader').innerHTML = '☢ ENEMY RETALIATION...';
  addLog('⚠ Enemy nations are retaliating!');
  var aiDelay = 0;
  aiNations.forEach(function(ai){
    if(ai.warheads <= 0 || ai.cities.every(function(c){ return c.pop<=0; })) return;
    var numStrikes = Math.min(ai.warheads, Math.ceil(Math.random()*2));
    for(var i = 0; i < numStrikes; i++){
      var aliveCities = playerNation.cities.filter(function(c){ return c.pop>0; });
      if(aliveCities.length === 0) break;
      var target = aliveCities[Math.floor(Math.random()*aliveCities.length)];
      var tIdx = playerNation.cities.indexOf(target);
      var aiCity = ai.cities.find(function(c){ return c.pop>0; }) || ai.cities[0];
      ai.warheads--;
      (function(a, ac, tg, ti){
        setTimeout(function(){
          addLog('🚀 ' + a.flag + ' ' + a.name + ' launched at ' + tg.name + '!');
          launchOneMissile(ac, tg, playerNation, ti);
        }, aiDelay);
      })(ai, aiCity, target, tIdx);
      aiDelay += 600;
    }
  });
  setTimeout(function(){ setTimeout(endTurn, 2000); }, aiDelay + 3000);
}

function endTurn(){
  var playerAlive = playerNation.cities.some(function(c){ return c.pop>0; });
  var anyEnemyAlive = aiNations.some(function(n){ return n.cities.some(function(c){ return c.pop>0; }) && n.warheads > 0; });
  if(!playerAlive){ gameOver(false); return; }
  if(!anyEnemyAlive || playerNation.warheads <= 0){ gameOver(true); return; }
  turnNumber++;
  gamePhase = 'PLAYING';
  document.getElementById('gamePhaseHeader').innerHTML = '☢ TURN ' + turnNumber + ' — SELECT TARGETS';
  document.getElementById('gamePhaseHeader').style.color = 'var(--accent2)';
  addLog('── Turn ' + turnNumber + ' ──');
  updatePlayerHUD();
  renderGlobalStats();
  createCityMarkers();
}

function gameOver(won){
  gamePhase = 'GAME_OVER';
  var msg = won ? '🏆 VICTORY — All enemies neutralized' : '💀 DEFEAT — Your nation has fallen';

  document.getElementById('gamePhaseHeader').style.color = won ? 'var(--green)' : 'var(--red)';

// COUNTRY DESTRUCTION SYSTEM — Catastrophic visual effects
// When a nation loses all cities, its territory burns on the globe
// ═══════════════════════════════════════════════════════════════

// Map nation IDs to ISO codes for matching country polygons
const NATION_TO_ISO = {
  'usa':'840','russia':'643','china':'156','uk':'826','france':'250',
  'india':'356','pakistan':'586','israel':'376','nkorea':'408','iran':'364'
};

function checkNationDestroyed(nation){
  var allDead = nation.cities.every(function(c){ return c.pop <= 0; });
  if(allDead && !destroyedNationIds.has(nation.id)){
    destroyedNationIds.add(nation.id);
    addLog('☠️ ' + nation.flag + ' ' + nation.name + ' HAS BEEN DESTROYED!');
    applyDestructionVisuals(nation);
  }
}

function applyDestructionVisuals(nation){
  var isoCode = NATION_TO_ISO[nation.id];
  if(!isoCode) return;

  // ── 1. Turn country polygons to scorched burning look ──
  countryFills.forEach(function(mesh){
    if(mesh.userData.countryId === isoCode){
      mesh.userData.destroyed = true;
      mesh.userData.destroyTime = performance.now();
      mesh.material.color.set('#4a0800');
      mesh.material.opacity = 0.35;
      mesh.material.transparent = true;
    }
  });

  // ── 2. Turn borders to fiery red/orange ──
  // We can't easily match borders to specific countries in the current mesh structure,
  // so we add fire effects on all city locations and across the territory

  // ── 3. Add 3D fire effects across the nation's territory ──
  var cities = nation.cities;
  cities.forEach(function(city){
    // Multiple fire points per city for coverage
    for(var f = 0; f < 5; f++){
      var offsetLat = city.lat + (Math.random() - 0.5) * 3;
      var offsetLng = city.lng + (Math.random() - 0.5) * 3;
      addFireEffect3D(offsetLat, offsetLng);
    }
    // Large scorch mark at each city
    addScorchMark3D(city.lat, city.lng);
  });

  // ── 4. Add fire points between cities for territory coverage ──
  for(var i = 0; i < cities.length - 1; i++){
    for(var j = i + 1; j < cities.length; j++){
      var nPoints = 3 + Math.floor(Math.random() * 3);
      for(var p = 0; p < nPoints; p++){
        var t = (p + 1) / (nPoints + 1) + (Math.random() - 0.5) * 0.15;
        var lat = cities[i].lat + (cities[j].lat - cities[i].lat) * t + (Math.random() - 0.5) * 4;
        var lng = cities[i].lng + (cities[j].lng - cities[i].lng) * t + (Math.random() - 0.5) * 4;
        addFireEffect3D(lat, lng);
      }
    }
  }

  // ── 5. Add HTML overlay destruction labels ──
  var centerLat = cities.reduce(function(s,c){return s+c.lat;},0) / cities.length;
  var centerLng = cities.reduce(function(s,c){return s+c.lng;},0) / cities.length;
  addDestructionLabel(centerLat, centerLng, nation.flag + ' DESTROYED');
}

function addFireEffect3D(lat, lng){
  var pos = latLngToVec3(lat, lng, globeRadius * 1.005);
  var N = pos.clone().normalize();

  // Fire glow sphere (persistent, animated in update loop)
  var fSize = 0.008 + Math.random() * 0.015;
  var fGeo = new THREE.SphereGeometry(fSize, 8, 8);
  var fireColors = [0xff2200, 0xff4400, 0xff6600, 0xffaa00, 0xff3311];
  var fColor = fireColors[Math.floor(Math.random() * fireColors.length)];
  var fMat = new THREE.MeshBasicMaterial({color: fColor, transparent: true, opacity: 0.5, depthWrite: false});
  var fMesh = new THREE.Mesh(fGeo, fMat);
  fMesh.position.copy(pos);
  globeGroup.add(fMesh);

  // Smoke plume above fire
  var smSize = 0.012 + Math.random() * 0.02;
  var smGeo = new THREE.SphereGeometry(smSize, 6, 6);
  var smMat = new THREE.MeshBasicMaterial({color: 0x332211, transparent: true, opacity: 0.25, depthWrite: false});
  var smMesh = new THREE.Mesh(smGeo, smMat);
  smMesh.position.copy(pos.clone().add(N.clone().multiplyScalar(0.03)));
  globeGroup.add(smMesh);

  destructionEffects3D.push({
    type: 'fire',
    mesh: fMesh,
    smoke: smMesh,
    basePos: pos.clone(),
    normal: N.clone(),
    phase: Math.random() * Math.PI * 2,
    speed: 2 + Math.random() * 3,
    baseOpacity: 0.3 + Math.random() * 0.4,
    baseSize: fSize
  });
}

function addScorchMark3D(lat, lng){

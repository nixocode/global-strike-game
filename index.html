// ── Animate destruction effects (called every frame) ──
function updateDestructionEffects(t){
  // 3D fire/smoke animation
  destructionEffects3D.forEach(function(ef){
    if(ef.type === 'fire'){
      // Flickering fire
      var flicker = Math.sin(t * ef.speed + ef.phase) * 0.5 + 0.5;
      var flicker2 = Math.sin(t * ef.speed * 1.7 + ef.phase * 2.3) * 0.5 + 0.5;
      ef.mesh.material.opacity = ef.baseOpacity * (0.4 + flicker * 0.6);
      var s = 0.7 + flicker2 * 0.8;
      ef.mesh.scale.set(s, s, s);
      // Move fire slightly along normal (licking flames)
      var rise = 0.003 + flicker * 0.008;
      ef.mesh.position.copy(ef.basePos.clone().add(ef.normal.clone().multiplyScalar(rise)));
      // Color shift orange<->red
      var r = 0.8 + flicker * 0.2;
      var g = 0.15 + flicker2 * 0.25;
      ef.mesh.material.color.setRGB(r, g, 0);

      // Smoke rises and pulses
      if(ef.smoke){
        var smokeRise = 0.02 + Math.sin(t * 0.8 + ef.phase) * 0.015 + flicker * 0.02;
        ef.smoke.position.copy(ef.basePos.clone().add(ef.normal.clone().multiplyScalar(smokeRise)));
        ef.smoke.material.opacity = 0.1 + flicker2 * 0.15;
        var ss = 0.8 + Math.sin(t * 0.5 + ef.phase) * 0.4;
        ef.smoke.scale.set(ss, ss, ss);
      }
    }
    if(ef.type === 'scorch_ring'){
      // Pulsing fiery border
      var pulse = Math.sin(t * ef.speed + ef.phase) * 0.5 + 0.5;
      ef.mesh.material.opacity = 0.1 + pulse * 0.2;
      var r = 0.7 + pulse * 0.3;
      var g = 0.1 + pulse * 0.15;
      ef.mesh.material.color.setRGB(r, g, 0);
    }
  });

  // Animate destroyed country polygon fills
  countryFills.forEach(function(mesh){
    if(mesh.userData.destroyed){
      var elapsed = (performance.now() - mesh.userData.destroyTime) / 1000;
      var pulse = Math.sin(elapsed * 2) * 0.5 + 0.5;
      var pulse2 = Math.sin(elapsed * 3.7 + 1.2) * 0.5 + 0.5;
      // Alternate between dark scorched and fiery red
      var r = 0.15 + pulse * 0.2;
      var g = 0.02 + pulse2 * 0.04;
      var b = 0;
      mesh.material.color.setRGB(r, g, b);
      mesh.material.opacity = 0.25 + pulse * 0.15;
    }
  });

  // Update HTML destruction labels (project to screen)
  var W = renderer.domElement.clientWidth;
  var H = renderer.domElement.clientHeight;
  var hw = W / 2;
  var hh = H / 2;
  var container = document.getElementById('htmlMarkers');

  destructionMarkerEls.forEach(function(dm){
    if(!dm.el){
      dm.el = document.createElement('div');
      dm.el.className = 'destroyed-label';
      dm.el.textContent = dm.text;
      container.appendChild(dm.el);
    }
    var pos = _tempPos.copy(dm.pos3d).applyMatrix4(globeGroup.matrixWorld);
    _tempViewDir.subVectors(camera.position, pos).normalize();
    _tempNormal.copy(pos).normalize();
    var isVisible = _tempNormal.dot(_tempViewDir) > 0.1;
    if(isVisible){
      pos.project(camera);
      dm.el.style.left = ((pos.x * hw) + hw) + 'px';
      dm.el.style.top = (-(pos.y * hh) + hh) + 'px';
      dm.el.style.display = 'block';
    } else {
      dm.el.style.display = 'none';
    }
  });
}

// ═══════════════════════════════════════════════════════════════
// EXPLOSION V3 — NEW SYSTEM (built separately for safe testing)
// Realistic nuclear: flash → fireball → shockwave → mushroom → debris
// All effects on globe only. No full-screen flash.
// ═══════════════════════════════════════════════════════════════

var explosionsV3 = []; // separate array from old system

function triggerExplosionV3(lat, lng){
  var pos = latLngToVec3(lat, lng, globeRadius * 1.003);
  var N = pos.clone().normalize(); // surface normal

  // Tangent basis for surface-aligned effects
  var T1 = new THREE.Vector3(1,0,0).cross(N).normalize();
  if(T1.lengthSq() < 0.01) T1 = new THREE.Vector3(0,1,0).cross(N).normalize();
  var T2 = N.clone().cross(T1).normalize();

  // Per-detonation randomization
  var sVar = 0.85 + Math.random()*0.3;  // size 0.85x–1.15x
  var cShift = Math.random()*0.12;       // subtle hue shift

  // Quaternion to orient cylinders/hemispheres along surface normal
  var upQ = new THREE.Quaternion().setFromUnitVectors(new THREE.Vector3(0,1,0), N);

  // ─── 1. INITIAL FLASH — bright point, globe-only, very fast ───
  var flGeo = new THREE.SphereGeometry(0.02*sVar, 16, 16);
  var flMat = new THREE.MeshBasicMaterial({color:0xeeffff, transparent:true, opacity:1, depthWrite:false});
  var fl = new THREE.Mesh(flGeo, flMat);
  fl.position.copy(pos);
  globeGroup.add(fl);
  explosionsV3.push({type:'v3_flash', mesh:fl, t:0, sVar:sVar});

  // ─── 2. GLOBE SHAKE — only moves globeGroup ───
  var gOX=globeGroup.position.x, gOY=globeGroup.position.y, gOZ=globeGroup.position.z;
  var skT=0;
  var skI=setInterval(function(){
    skT+=0.025;
    if(skT>1){clearInterval(skI);globeGroup.position.set(gOX,gOY,gOZ);return;}
    var amp=skT<0.12? 0.04*(1-skT/0.12) : 0.012*Math.pow(1-skT,3);
    globeGroup.position.x=gOX+(Math.random()-0.5)*amp;
    globeGroup.position.y=gOY+(Math.random()-0.5)*amp;
    globeGroup.position.z=gOZ+(Math.random()-0.5)*amp*0.3;
  },16);

  // ─── 3. FIREBALL — white→orange→red-brown, rises slightly ───
  setTimeout(function(){
    var fbGeo = new THREE.SphereGeometry(0.028*sVar, 20, 20);
    var fbMat = new THREE.MeshBasicMaterial({color:0xffffff, transparent:true, opacity:0.9, depthWrite:false});
    var fb = new THREE.Mesh(fbGeo, fbMat);
    fb.position.copy(pos.clone().add(N.clone().multiplyScalar(0.01)));
    globeGroup.add(fb);
    explosionsV3.push({type:'v3_fireball', mesh:fb, t:0, N:N.clone(), base:pos.clone(), sVar:sVar, cShift:cShift});

    // Hot inner core
    var icGeo = new THREE.SphereGeometry(0.015*sVar, 14, 14);
    var icMat = new THREE.MeshBasicMaterial({color:0xffffee, transparent:true, opacity:1, depthWrite:false});
    var ic = new THREE.Mesh(icGeo, icMat);
    ic.position.copy(fb.position);
    globeGroup.add(ic);
    explosionsV3.push({type:'v3_core', mesh:ic, t:0, N:N.clone(), base:pos.clone(), sVar:sVar});
  }, 40);

  // ─── 4. SHOCKWAVE — 2 rings racing along globe surface ───
  setTimeout(function(){
    for(var i=0;i<2;i++){
      (function(idx){
        var rGeo = new THREE.RingGeometry(0.003, 0.01+idx*0.004, 72);
        var rMat = new THREE.MeshBasicMaterial({
          color: idx===0?0xffffff:0xffddaa, transparent:true,
          opacity:0.6-idx*0.15, side:THREE.DoubleSide, depthWrite:false
        });
        var rMesh = new THREE.Mesh(rGeo, rMat);
        rMesh.position.copy(pos.clone().add(N.clone().multiplyScalar(0.002)));
        rMesh.lookAt(rMesh.position.clone().add(N));
        globeGroup.add(rMesh);
        explosionsV3.push({type:'v3_shockwave', mesh:rMesh, t:0, idx:idx, sVar:sVar});
      })(i);
    }
  }, 60);

  // ─── 5. THERMAL GLOW — warm orange surface mark ───
  setTimeout(function(){
    var tGeo = new THREE.CircleGeometry(0.035*sVar, 32);
    var tMat = new THREE.MeshBasicMaterial({
      color:0xff6600, transparent:true, opacity:0.3,
      side:THREE.DoubleSide, depthWrite:false
    });
    var tMesh = new THREE.Mesh(tGeo, tMat);
    tMesh.position.copy(pos.clone().add(N.clone().multiplyScalar(0.001)));
    tMesh.lookAt(tMesh.position.clone().add(N));
    globeGroup.add(tMesh);
    explosionsV3.push({type:'v3_thermal', mesh:tMesh, t:0, sVar:sVar});
  }, 30);

  // ─── 6. MUSHROOM STEM — segments rise one by one ───
  setTimeout(function(){
    var nSegs = 12;
    for(var s=0;s<nSegs;s++){
      var sR = (0.012 - s*0.0003)*sVar;
      var sGeo = new THREE.SphereGeometry(sR, 8, 8);
      var frac = s/nSegs;
      var r = 0.4+frac*0.35+cShift, g = 0.2+frac*0.1, b = 0.08+frac*0.04;
      var sMat = new THREE.MeshBasicMaterial({
        color:new THREE.Color(r,g,b), transparent:true, opacity:0.55, depthWrite:false
      });
      var sP = new THREE.Mesh(sGeo, sMat);
      sP.position.copy(pos);
      globeGroup.add(sP);
      explosionsV3.push({
        type:'v3_stem', mesh:sP, t:0, N:N.clone(), base:pos.clone(),
        seg:s, total:nSegs, sVar:sVar,
        tgtH: (0.02 + s*0.02)*sVar,
        wobble:(Math.random()-0.5)*0.006,
        startColor:new THREE.Color(r,g,b)
      });
    }
  }, 180);

  // ─── 7. MUSHROOM CAP — cluster of blobs at top ───
  setTimeout(function(){
    var nCap = 8 + Math.floor(Math.random()*4);
    for(var c=0;c<nCap;c++){
      var cR = (0.03+Math.random()*0.02)*sVar;
      var cGeo = new THREE.SphereGeometry(cR, 10, 10);
      var cr=0.5+Math.random()*0.3+cShift, cg=0.2+Math.random()*0.12, cb=0.07+Math.random()*0.05;
      var cMat = new THREE.MeshBasicMaterial({
        color:new THREE.Color(cr,cg,cb), transparent:true, opacity:0.5, depthWrite:false
      });
      var cP = new THREE.Mesh(cGeo, cMat);
      cP.position.copy(pos);
      globeGroup.add(cP);
      var ang = (c/nCap)*Math.PI*2 + (Math.random()-0.5)*0.5;
      var spr = (0.02+Math.random()*0.03)*sVar;
      explosionsV3.push({
        type:'v3_cap', mesh:cP, t:0, N:N.clone(), base:pos.clone(),
        T1:T1.clone(), T2:T2.clone(),
        ang:ang, spr:spr, sVar:sVar,
        tgtH:(0.25+Math.random()*0.08)*sVar,
        startColor:new THREE.Color(cr,cg,cb)
      });
    }

    // Dome glow at cap top
    var dGeo = new THREE.SphereGeometry(0.045*sVar, 14, 14);
    var dMat = new THREE.MeshBasicMaterial({color:0xffbb44, transparent:true, opacity:0.35, depthWrite:false});
    var dM = new THREE.Mesh(dGeo, dMat);
    dM.position.copy(pos);
    globeGroup.add(dM);
    explosionsV3.push({type:'v3_dome', mesh:dM, t:0, N:N.clone(), base:pos.clone(), sVar:sVar});
  }, 220);

  // ─── 8. DEBRIS — drawn upward then drifts/settles ───
  setTimeout(function(){
    for(var p=0;p<25;p++){
      var pS = (0.002+Math.random()*0.005)*sVar;
      var pGeo = new THREE.SphereGeometry(pS, 5, 5);
      var sh = Math.random();
      var pC = sh>0.8?0xff5500 : sh>0.5?0x7a4422 : sh>0.25?0x555544 : 0x333322;
      var pMat = new THREE.MeshBasicMaterial({color:pC, transparent:true, opacity:0.8, depthWrite:false});
      var pM = new THREE.Mesh(pGeo, pMat);
      pM.position.copy(pos);
      var vel = N.clone().multiplyScalar(0.002+Math.random()*0.006);
      vel.add(T1.clone().multiplyScalar((Math.random()-0.5)*0.003));
      vel.add(T2.clone().multiplyScalar((Math.random()-0.5)*0.003));
      globeGroup.add(pM);
      explosionsV3.push({
        type:'v3_debris', mesh:pM, t:0, vel:vel, N:N.clone(),
        riseT:0.6+Math.random()*1.0,
        drift:new THREE.Vector3((Math.random()-0.5)*0.0008,(Math.random()-0.5)*0.0008,(Math.random()-0.5)*0.0008)
      });
    }
  }, 130);

  // ─── PERMANENT: scorched crater ───
  var crGeo = new THREE.CircleGeometry(0.05*sVar, 28);
  var crMat = new THREE.MeshBasicMaterial({color:0x1a0800, transparent:true, opacity:0.5, side:THREE.DoubleSide, depthWrite:false});
  var cr = new THREE.Mesh(crGeo, crMat);
  cr.position.copy(latLngToVec3(lat, lng, globeRadius*1.0004));
  cr.lookAt(cr.position.clone().add(N));
  globeGroup.add(cr);

  // Lingering ember glow
  var emGeo = new THREE.SphereGeometry(0.04*sVar, 12, 12);
  var emMat = new THREE.MeshBasicMaterial({color:0xff3300, transparent:true, opacity:0.2, depthWrite:false});
  var em = new THREE.Mesh(emGeo, emMat);
  em.position.copy(pos);
  globeGroup.add(em);
  explosionsV3.push({type:'v3_ember', mesh:em, t:0});
}

function updateExplosionsV3(dt){
  function kill(e){globeGroup.remove(e.mesh);e.mesh.geometry.dispose();e.mesh.material.dispose();e.dead=true;}

  explosionsV3.forEach(function(e){
    e.t += dt;

    if(e.type==='v3_flash'){
      var s=1+e.t*50; e.mesh.scale.set(s,s,s);
      e.mesh.material.opacity=Math.max(0,1-e.t*8);
      if(e.t>0.15) kill(e);
    }

    if(e.type==='v3_fireball'){
      var s=1+e.t*4.5*e.sVar; e.mesh.scale.set(s,s,s);
      var rise=Math.min(e.t*0.04,0.05);
      e.mesh.position.copy(e.base.clone().add(e.N.clone().multiplyScalar(0.01+rise)));
      // Color: white→orange→red-brown
      var r,g,b;
      if(e.t<0.15){r=1;g=1;b=0.9;}
      else if(e.t<0.5){var f=(e.t-0.15)/0.35; r=1;g=1-f*0.4;b=0.9-f*0.8;}
      else if(e.t<1.2){var f=(e.t-0.5)/0.7; r=1-f*0.3;g=0.6-f*0.3;b=0.1-f*0.05;}
      else{var f=Math.min((e.t-1.2)/0.8,1); r=0.7-f*0.4;g=0.3-f*0.2;b=0.05;}
      e.mesh.material.color.setRGB(r+e.cShift,g,b);
      e.mesh.material.opacity=Math.max(0,0.9-Math.max(0,e.t-0.6)*0.5);
      if(e.t>2) kill(e);
    }

    if(e.type==='v3_core'){
      var s=1+e.t*3.5*e.sVar; e.mesh.scale.set(s,s,s);
      var rise=Math.min(e.t*0.04,0.05);
      e.mesh.position.copy(e.base.clone().add(e.N.clone().multiplyScalar(0.01+rise)));
      e.mesh.material.opacity=Math.max(0,1-e.t*1.8);
      if(e.t>0.6) kill(e);
    }

    if(e.type==='v3_shockwave'){
      var spd=25-e.idx*5; var s=1+e.t*spd;
      e.mesh.scale.set(s,s,s);
      var life=1.0+e.idx*0.2;
      e.mesh.material.opacity=Math.max(0,(0.6-e.idx*0.15)*(1-e.t/life));
      if(e.t>life) kill(e);
    }

    if(e.type==='v3_thermal'){
      var s=1+e.t*6*e.sVar; e.mesh.scale.set(s,s,1);
      e.mesh.material.opacity=Math.max(0,0.3*(1-e.t/0.7));
      if(e.t>0.7) kill(e);
    }

    if(e.type==='v3_stem'){
      var dur=1.0; var rt=Math.min(e.t/dur,1);
      var ez=1-Math.pow(1-rt,2.5);
      var h=e.tgtH*ez;
      e.mesh.position.copy(e.base.clone().add(e.N.clone().multiplyScalar(h)));
      // Turbulence wobble
      if(e.wobble){
        var wOff=e.wobble*Math.sin(e.t*3.5+e.seg*1.1);
        e.mesh.position.x+=wOff; e.mesh.position.y+=wOff*0.5;
      }
      var w=0.5+ez*0.8+(e.seg/e.total)*0.5;
      e.mesh.scale.set(w,w,w);
      e.mesh.material.opacity=Math.max(0,0.55-Math.max(0,e.t-1.8)*0.12);
      // Cool: brown→grey-white
      if(e.t>1.5&&e.startColor){
        var cool=Math.min((e.t-1.5)/3,1)*0.25;
        var sc=e.startColor;
        e.mesh.material.color.setRGB(sc.r+(0.7-sc.r)*cool, sc.g+(0.65-sc.g)*cool, sc.b+(0.6-sc.b)*cool);
      }
      if(e.t>5) kill(e);
    }

    if(e.type==='v3_cap'){
      var dur=1.3; var rt=Math.min(e.t/dur,1);
      var ez=1-Math.pow(1-rt,2);
      var h=e.tgtH*ez;
      var spread=e.spr*ez;
      var lateralGrow=e.t>dur?1+(e.t-dur)*0.12:1;
      var off=e.N.clone().multiplyScalar(h)
        .add(e.T1.clone().multiplyScalar(Math.cos(e.ang)*spread*lateralGrow))
        .add(e.T2.clone().multiplyScalar(Math.sin(e.ang)*spread*lateralGrow));
      e.mesh.position.copy(e.base.clone().add(off));
      var s=0.3+ez*1.3;
      var flat=0.6-Math.max(0,e.t-dur)*0.025;
      e.mesh.scale.set(s*lateralGrow, s*Math.max(0.35,flat), s*lateralGrow);
      e.mesh.material.opacity=Math.max(0,0.5-Math.max(0,e.t-2.5)*0.08);
      // Cool: red-brown → white
      if(e.t>1.5&&e.startColor){
        var cool=Math.min((e.t-1.5)/4,1);
        var sc=e.startColor;
        e.mesh.material.color.setRGB(sc.r+(0.82-sc.r)*cool, sc.g+(0.8-sc.g)*cool, sc.b+(0.75-sc.b)*cool);
      }
      if(e.t>6) kill(e);
    }

    if(e.type==='v3_dome'){
      var dur=1.4; var rt=Math.min(e.t/dur,1);
      var ez=1-Math.pow(1-rt,2);
      var h=0.3*e.sVar*ez;
      e.mesh.position.copy(e.base.clone().add(e.N.clone().multiplyScalar(h)));
      var s=0.2+ez*1.3; e.mesh.scale.set(s,s*0.45,s);
      e.mesh.material.opacity=Math.max(0,0.35-Math.max(0,e.t-2)*0.07);
      var br=Math.max(0.4,1-e.t*0.15);
      e.mesh.material.color.setRGB(br,br*0.55+0.25,br*0.15+0.3);
      if(e.t>6) kill(e);
    }

    if(e.type==='v3_debris'){
      if(e.t<e.riseT){
        e.mesh.position.add(e.vel); e.vel.multiplyScalar(0.99);
      } else {
        var grav=e.mesh.position.clone().normalize().multiplyScalar(-0.00005);
        e.vel.add(grav); e.vel.add(e.drift); e.vel.multiplyScalar(0.996);
        e.mesh.position.add(e.vel);
      }
      e.mesh.material.opacity=Math.max(0,0.8-e.t*0.16);
      var s=Math.max(0.3,1-e.t*0.12); e.mesh.scale.set(s,s,s);
      if(e.t>5) kill(e);
    }

    if(e.type==='v3_ember'){
      var pulse=0.2+Math.sin(e.t*2)*0.08;
      e.mesh.material.opacity=Math.max(0,pulse-e.t*0.02);
      var s=1+e.t*0.12; e.mesh.scale.set(s,s,s);
      if(e.t>8) kill(e);
    }
  });
  explosionsV3=explosionsV3.filter(function(e){return !e.dead;});
}

// ─── Hook V3 into the animation loop ───
var _origAnimate = animate;
// We'll patch the game loop to also update V3 explosions
// by injecting into the existing animate's game-update section

// ─── Init ───
renderGlobalStats();
renderNationSelect();
updateTimestampEnhanced();
setInterval(updateTimestampEnhanced, 1000);
initGlobe();
</script>
